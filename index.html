<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Возвращение</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
      margin-top: 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    p {
      color: #d1d5db;
      font-size: 17px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: #38bdf8;
      color: #0f172a;
      font-size: 18px;
      font-weight: 700;
    }

    .small {
      margin-top: 20px;
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Возвращение</h1>
    <p>Добро пожаловать в мини-приложение. Здесь можно сделать меню, анкету, магазин, игру или личный кабинет.</p>

    <button onclick="sendData()">Начать</button>

    <div class="small">Работает внутри Telegram ✨</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function sendData() {
      tg.sendData("Пользователь нажал Начать");
    }
  </script>
</body>
</html>
